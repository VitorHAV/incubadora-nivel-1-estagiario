<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Register</title>
    </head>
    <body style="background-image: url(loginFundo.jpg); background-repeat: no-repeat; background-size: cover;" >
        <h1 style="display: flex; justify-content: center;">Cadastro</h1>
        <div style="display: flex; flex-direction: column; align-items: center; background: rgba(255, 255, 255, 0.5); border-radius: 10px; width: 20%; margin: auto auto;">
            <form style="display: flex; flex-direction: column; align-items: center; width: 100%; line-height: 0.5;">
                <label for="username">Nome Completo:</label>
                <br>
                <input type="text" id="username" name="username" required placeholder="Nome Completo">
                <br>
                <label for="email">E-mail:</label>
                <br>
                <input type="email" id="email" name="email" required autocomplete="email" placeholder="E-mail">
                <br>
                <label for="password">Password:</label>
                <br>
                <input type="password" id="password" name="password" required placeholder="Password">
                <br>
                <label for="cellphone">Telefone:</label>
                <br>
                <input type="tel" id="cellphone" name="cellphone" placeholder="Telefone (opcional)">
                <br>
                <input type="checkbox" id="terms" name="terms" required>
                <label for="terms">Eu concordo com os termos e condições</label>
                <br>
                <button type="submit">Cadastrar</button>
            </form>
            <a href="login.html" target="_blank">Já tem uma conta? Faça login</a>
        </div>
    </body>
</html>

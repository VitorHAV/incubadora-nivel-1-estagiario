<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Register</title>
    </head>
    <body>
        <h1>Register</h1>
        <div style="display: flex; flex-direction: column; align-items: center; background: rgba(255, 255, 255, 0.5); border-radius: 20px; width: 40%; margin: 0 auto;">
            <form>
                <label for="username">Username:</label>
                <br>
                <input type="text" id="username" name="username" required autocomplete="username" placeholder="Username">
                <br>
                <label for="email">Email:</label>
                <br>
                <input type="email" id="email" name="email" required autocomplete="email" placeholder="Email">
                <br>
                <label for="password">Password:</label>
                <br>
                <input type="password" id="password" name="password" required placeholder="Password">
                <br>
                <button type="submit">Register</button>
            </form>
            <a href="login.html" target="_blank">Já tem uma conta? Faça login</a>
        </div>
    </body>
</html>
